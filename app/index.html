<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>CatchWord</title>
    <link href="/src/style.css" rel="stylesheet">
</head>
<body>
<div class="popup-container" id="popup">
    <div class="popup-header">
        <span class="word" id="word"></span>
        <div class="header-actions">
            <button class="fav-btn" id="fav-btn" title="收藏">
                <svg height="16" viewBox="0 0 24 24" width="16">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </button>
            <button class="audio-btn" id="audio-btn" title="播放发音">
                <svg fill="none" height="16" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                </svg>
            </button>
        </div>
    </div>
    <div class="phonetic" id="phonetic"></div>
    <div class="divider"></div>
    <div class="translation" id="translation"></div>
    <div class="definitions" id="definitions"></div>
    <div class="examples" id="examples"></div>
    <div class="popup-footer">
        <button class="mastered-toggle" id="mastered-toggle">
            <svg fill="none" height="14" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <span>已掌握</span>
        </button>
    </div>
</div>

<audio id="audio-player" style="display:none"></audio>
<script src="/src/main.js" type="module"></script>
</body>
</html>
